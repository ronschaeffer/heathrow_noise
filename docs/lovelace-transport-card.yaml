# Heathrow Noise — Transport dashboard cards
#
# Two cards required:
#   1. Mushroom Template Card (compact tile) — goes in the "Heathrow Noise" section
#   2. Bubble Card pop-up (week schedule) — goes in its own vertical-stack section,
#      placed LAST in the dashboard so the pop-up renders correctly
#
# Prerequisites:
#   HACS: mushroom, bubble-card
#   Entities: all sensor.heathrow_noise_* and binary_sensor.heathrow_noise_*

# ── 1. Compact tile ──────────────────────────────────────────────────────────
type: custom:mushroom-template-card
grid_options:
  columns: full
tap_action:
  action: navigate
  navigation_path: "#heathrow-noise"

# Icon: landing (Westerly), takeoff (Easterly), neutral (quiet/unknown)
icon: >-
  {% set mode = states('sensor.heathrow_noise_operations_mode') %}
  {% if mode == 'Easterly' %}mdi:airplane-takeoff
  {% elif mode == 'Westerly' %}mdi:airplane-landing
  {% else %}
    {% set ps = state_attr('sensor.heathrow_noise_schedule', 'periods') or [] %}
    {% if ps | count > 0 and (ps[0].start | as_datetime) <= now() %}mdi:airplane-landing
    {% else %}mdi:airplane
    {% endif %}
  {% endif %}

# Icon colour: live impact first, fall back to scheduled period when classifier
# returns Unknown (e.g. FLIGHTTRACK offline or outside operational hours)
icon_color: >-
  {% set i = states('sensor.heathrow_noise_overhead_impact') %}
  {% if i == 'Unknown' %}
    {% set ps = state_attr('sensor.heathrow_noise_schedule', 'periods') or [] %}
    {% if ps | count > 0 and (ps[0].start | as_datetime) <= now() %}
      {% set i = ps[0].impact %}
    {% endif %}
  {% endif %}
  {% if i == 'High' %}red
  {% elif i == 'Mid' %}orange
  {% elif i == 'Low' %}green
  {% else %}disabled
  {% endif %}

# Primary: "Runway 27L • Westerly" with schedule fallback when classifier Unknown
primary: >-
  {% set mode = states('sensor.heathrow_noise_operations_mode') %}
  {% set rwy = states('sensor.heathrow_noise_arrivals_runway') %}
  {% set ps = state_attr('sensor.heathrow_noise_schedule', 'periods') or [] %}
  {% if mode == 'Westerly' %}Runway {{ rwy }} • Westerly
  {% elif mode == 'Easterly' %}Runway {{ rwy }} • Easterly
  {% elif ps | count > 0 and (ps[0].start | as_datetime) <= now() %}Runway {{ ps[0].runway }} • Westerly
  {% else %}Quiet hours
  {% endif %}

# Secondary (context-aware):
#   High/Mid → "Switch HH:MM • High ➜ Low"  (when does it get better?)
#   Low       → "High from HH:MM Mon"         (when does it get noisy?)
#   Pre-ops   → "High from HH:MM"             (first period of the day)
secondary: >-
  {% set ps = state_attr('sensor.heathrow_noise_schedule', 'periods') or [] %}
  {% set mode = states('sensor.heathrow_noise_operations_mode') %}
  {% set impact = states('sensor.heathrow_noise_overhead_impact') %}
  {% set n = states('sensor.heathrow_noise_next_runway_switch') %}
  {% set nh = states('sensor.heathrow_noise_next_high_impact_period') %}
  {% if mode in ['Westerly', 'Easterly'] or (ps | count > 0 and (ps[0].start | as_datetime) <= now()) %}
    {% set cur = impact if impact != 'Unknown' else (ps[0].impact if ps | count > 0 else 'Unknown') %}
    {% if cur in ['High', 'Mid'] %}
      {% if n not in ['unknown', 'unavailable'] %}
        {% set t = n | as_datetime | as_local %}
        {% set ni = ps[1].impact if ps | count > 1 else 'Low' %}
        Switch {{ t.strftime('%-H:%M') }} • {{ cur }} ➜ {{ ni }}
      {% else %}{{ cur }} impact
      {% endif %}
    {% else %}
      {% if nh not in ['unknown', 'unavailable'] %}
        {% set t = nh | as_datetime | as_local %}
        High from {{ t.strftime('%-H:%M') }} {{ t.strftime('%a') }}
      {% else %}Low • No High period scheduled
      {% endif %}
    {% endif %}
  {% else %}
    {% if ps | count > 0 %}
      {{ ps[0].impact }} from {{ (ps[0].start | as_datetime | as_local).strftime('%-H:%M') }}
    {% else %}No schedule
    {% endif %}
  {% endif %}

---
# ── 2. Pop-up (place in its own vertical-stack section, last in dashboard) ───
type: vertical-stack
cards:
  - type: custom:bubble-card
    card_type: pop-up
    hash: "#heathrow-noise"
    icon: mdi:airplane

  - type: markdown
    content: >-
      {% set ps = state_attr("sensor.heathrow_noise_schedule", "periods") or [] %}
      {% set ns = namespace(d="") %}
      {% for p in ps %}
        {% set s = p.start | as_datetime | as_local %}
        {% set e = p.end | as_datetime | as_local %}
        {% set day = s.strftime("%a %-d %b") %}
        {% if day != ns.d %}{% set ns.d = day %}

      **{{ day }}**
        {% endif %}
      `{{ s.strftime("%H:%M") }}–{{ e.strftime("%H:%M") }}`  **{{ p.runway }}**  {{ "🔴 High" if p.impact == "High" else ("🟠 Mid" if p.impact == "Mid" else "🟢 Low") }}
      {% endfor %}
